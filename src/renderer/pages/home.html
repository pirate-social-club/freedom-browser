<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self'; script-src 'self'; connect-src 'self';"
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 48px;
        box-sizing: border-box;
        position: relative;
      }

      /* Dark theme (default) */
      body {
        background: #1f2020;
        color: #c7c7c7;
      }
      body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('images/home.png') no-repeat center center;
        background-size: cover;
        opacity: 0.6;
        z-index: -1;
      }
      h1 {
        font-size: 32px;
        margin-bottom: 16px;
      }
      p {
        max-width: 640px;
        line-height: 1.6;
        margin-bottom: 12px;
      }
      .status-card {
        margin-top: 28px;
        display: inline-flex;
        flex-direction: column;
        gap: 10px;
        min-width: 320px;
        padding: 18px 20px;
        border-radius: 14px;
        background: rgba(19, 20, 20, 0.76);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(8px);
      }
      .status-row {
        display: flex;
        justify-content: space-between;
        gap: 24px;
      }
      .status-label {
        color: #999;
      }
      .status-value {
        color: #f2f2f2;
      }
      .status-actions {
        display: flex;
        gap: 12px;
        margin-top: 8px;
      }
      .status-link {
        color: #f2f2f2;
        text-decoration: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.25);
      }
      .status-link:hover {
        border-bottom-color: rgba(255, 255, 255, 0.65);
      }
      .muted {
        color: #999;
      }
      h2 {
        font-size: 18px;
        margin-top: 32px;
        margin-bottom: 12px;
        color: #999;
      }
      code {
        background: #2a2a2a;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'SF Mono', Menlo, monospace;
        font-size: 13px;
      }
      ul {
        margin: 0;
        padding-left: 20px;
        line-height: 1.8;
      }
      li {
        margin-bottom: 4px;
      }
      a.protocol-link {
        color: #6eb5ff;
        text-decoration: none;
        background: #2a2a2a;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'SF Mono', Menlo, monospace;
        font-size: 13px;
        cursor: pointer;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }
      a.protocol-link:hover {
        background: #3a3a4a;
        color: #8ecfff;
      }
      .logo-dark {
        display: block;
      }
      .logo-light {
        display: none;
      }

      /* Light theme */
      @media (prefers-color-scheme: light) {
        body {
          background: #ffffff;
          color: #202124;
        }
        .status-card {
          background: rgba(255, 255, 255, 0.92);
          border-color: rgba(0, 0, 0, 0.08);
        }
        .status-value {
          color: #202124;
        }
        .muted {
          color: #5f6368;
        }
        h2 {
          color: #5f6368;
        }
        code {
          background: #f1f3f4;
        }
        a.protocol-link {
          color: #1a73e8;
          background: #f1f3f4;
        }
        a.protocol-link:hover {
          background: #e8eaed;
          color: #1558b0;
        }
        .logo-dark {
          display: none;
        }
        .logo-light {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <img
      class="logo-dark"
      src="images/freedom-logo-white.svg"
      alt="Freedom"
      style="height: 48px; margin-bottom: 24px"
    />
    <img
      class="logo-light"
      src="images/freedom-logo-black.svg"
      alt="Freedom"
      style="height: 48px; margin-bottom: 24px"
    />
    <p>
      Freedom starts on the open web and upgrades to HNS once the bundled resolver is ready.
    </p>
    <section class="status-card" aria-live="polite">
      <div class="status-row">
        <span class="status-label">Destination</span>
        <span class="status-value" id="home-destination">pirate.sc</span>
      </div>
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-value" id="home-status">Checking HNS</span>
      </div>
      <div class="status-row" id="home-height-row" hidden>
        <span class="status-label">Height</span>
        <span class="status-value" id="home-height">0</span>
      </div>
      <div class="status-actions">
        <a id="home-open-link" class="status-link" href="https://pirate.sc/">Open pirate.sc</a>
        <span id="home-note" class="muted">Waiting for bundled HNS.</span>
      </div>
    </section>
    <script src="scripts/home.js"></script>
  </body>
</html>
