name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          path: freedom-browser

      - name: Check out sentinel-ai-connect dependency
        uses: actions/checkout@v6
        with:
          repository: Sentinel-Autonomybuilder/blue-ai-connect
          path: blue-ai-connect

      - name: Prepare sentinel-ai-connect file dependency
        shell: bash
        run: cp -R blue-ai-connect ../blue-ai-connect

      - name: Start iron-proxy egress audit
        uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a
        with:
          egress-rules: freedom-browser/egress-rules.yaml
          warn: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: freedom-browser/package-lock.json

      - name: Install dependencies
        working-directory: freedom-browser
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        working-directory: freedom-browser
        run: npm audit --audit-level=high

      - name: Run lint
        working-directory: freedom-browser
        run: npm run lint

      - name: Run test coverage
        working-directory: freedom-browser
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: freedom-browser/coverage/
          if-no-files-found: error

      - name: Show iron-proxy egress summary
        uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a
        if: always()

  release-smoke:
    name: Release smoke (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux x64
            args: --linux --x64
          - os: macos-14
            label: macOS x64 unsigned
            args: --mac --x64 --unsigned --no-notarize
          - os: windows-latest
            label: Windows x64
            args: --win --x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          path: freedom-browser

      - name: Check out sentinel-ai-connect dependency
        uses: actions/checkout@v6
        with:
          repository: Sentinel-Autonomybuilder/blue-ai-connect
          path: blue-ai-connect

      - name: Prepare sentinel-ai-connect file dependency
        if: runner.os != 'Windows'
        shell: bash
        run: cp -R blue-ai-connect ../blue-ai-connect

      - name: Prepare sentinel-ai-connect file dependency (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item -Path blue-ai-connect -Destination .. -Recurse -Force

      - name: Start iron-proxy egress audit
        if: runner.os == 'Linux'
        uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a
        with:
          egress-rules: freedom-browser/egress-rules.yaml
          warn: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: freedom-browser/package-lock.json

      - name: Install dependencies
        working-directory: freedom-browser
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        working-directory: freedom-browser
        run: npm audit --audit-level=high

      - name: Verify release toolchain
        working-directory: freedom-browser
        run: node scripts/build.js --dist --verify-tools ${{ matrix.args }}

      - name: Show iron-proxy egress summary
        if: runner.os == 'Linux' && always()
        uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a
