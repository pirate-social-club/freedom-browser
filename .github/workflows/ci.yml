name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: freedom-browser

      - name: Check out sentinel-ai-connect dependency
        uses: actions/checkout@v4
        with:
          repository: Sentinel-Autonomybuilder/blue-ai-connect
          path: blue-ai-connect

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: freedom-browser/package-lock.json

      - name: Install dependencies
        working-directory: freedom-browser
        run: npm ci --ignore-scripts

      - name: Run lint
        working-directory: freedom-browser
        run: npm run lint

      - name: Run test coverage
        working-directory: freedom-browser
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: freedom-browser/coverage/
          if-no-files-found: error
